# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - freshdeskDomain
      - freshdeskApiKey
    properties:
      freshdeskDomain:
        type: string
        description: Your Freshdesk account subdomain (the part before .freshdesk.com)
      freshdeskApiKey:
        type: string
        description: Your Freshdesk API key
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { FRESHDESK_DOMAIN: config.freshdeskDomain, FRESHDESK_API_KEY: config.freshdeskApiKey, MCP_TRANSPORT: 'stdio' } })
